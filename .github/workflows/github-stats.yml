name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate stats SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets

          # --- Stats card ---
          curl -s "https://github-readme-stats.vercel.app/api?username=Hanumanthumanoj01&show_icons=true&theme=tokyonight&hide_border=true&count_private=true&include_all_commits=true" \
            -o assets/stats.svg

          # --- Top languages card ---
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=Hanumanthumanoj01&layout=compact&theme=tokyonight&hide_border=true&langs_count=8" \
            -o assets/top-langs.svg

          echo "✅ SVGs generated"
          ls -lh assets/

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/top-langs.svg
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update GitHub stats SVGs [skip ci]"
          git push
