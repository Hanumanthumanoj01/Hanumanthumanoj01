name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats
        uses: anuraghazra/github-readme-stats@master
        with:
          username: Hanumanthumanoj01
          theme: tokyonight
          hide_border: true
          show_icons: true
          count_private: true
          include_all_commits: true
          output_dir: assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate languages
        uses: anuraghazra/github-readme-stats@master
        with:
          username: Hanumanthumanoj01
          layout: compact
          theme: tokyonight
          hide_border: true
          output_dir: assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit SVGs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add assets/*.svg
          git commit -m "update stats" || echo "no changes"
          git push
